# SceneFactory road-goal-reaching training preset.
# Usage:
#   CUDA_VISIBLE_DEVICES=1 PYTHONUNBUFFERED=1 conda run -n isaac-pytorch python -u \
#     -m src.train_student_vehicle_goal_multiagent_rsl_rl \
#     --config configs/scene_factory/goal_reaching_roads_train.yaml \
#     --headless
#
# Purpose:
# - train on SceneFactory road geometry instead of an empty plane
# - keep the policy observation minimal: only goal-reaching terms
# - use scenario-derived start/goal pairs from the selected SceneFactory world

env:
  num_envs: 16
  num_agents_per_env: 2
  observation_mode: "goal_reaching"
  env_spacing: 240.0
  spawn_height_m: 1.2
  ground_mode: "plane"
  use_scene_factory_roads: true
  start_radius_m: 0.0
  agent_spawn_circle_radius_m: 0.0
  agent_spawn_jitter_m: 0.05
  episode_length_s: 40.0
  goal_radius_min_m: 5.0
  goal_radius_max_m: 30.0
  max_distance_from_origin_m: 100.0
  agent_neighbor_obs_scale_m: 100.0
  replicate_physics: true
  clone_in_fabric: "auto"

scene_factory:
  config_path: "configs/scene_factory/multiworld_scene.yaml"
  # Select the source scene explicitly. SceneFactory center-crops the configured world_size
  # around the scene center and does not reject a scene just because it is larger.
  world_index: 0

assets:
  student_usd: "artifacts/student_vehicle_assets/vehicle_only_smoke/student_fwd_vehicle.usd"
  tunable_config_json: "artifacts/student_vehicle_sysid/comprehensive_fwd_v1_cem_v4/best_config.json"

runner:
  log_dir: "logs/rsl_rl"
  seed: 42
  experiment_name: "scene_factory_goal_reaching_roads"
  run_name: "train"
  max_iterations: 300
  num_steps_per_env: 32
  save_interval: 25
  learning_rate: 3.0e-4
  num_learning_epochs: 5
  num_mini_batches: 4
  entropy_coef: 0.005
  clip_param: 0.2
  desired_kl: 0.01

app:
  device: "cuda:0"
  rl_device: "cuda:0"
