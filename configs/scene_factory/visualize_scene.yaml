# ============================================================
#  SceneFactory — GUI Visualization Config
#  Loads a small number of Waymo scenes with fitted vehicles
#  for illustration / screenshot purposes.
#  Launch with: bash run_visualize_scene.sh
# ============================================================

io:
  scene_json_dir: "data/processed/waymo_scenes_json"
  take_first_k_scenes: 4        # change to pick specific scenes

world:
  root_container: "/World/SceneFactoryWorlds"
  world_count: 4
  grid_cols: 2
  world_size_m: [200.0, 200.0]
  padding_m: 20.0
  base_z_m: 0.0
  bounds_size_m: 200.0
  origin_mode: "center"
  origin_center_mode: "mean"

road:
  # explicit_prims gives clean geometry in the GUI viewer
  render_mode: "explicit_prims"
  jump_break_m: 3.0
  seg_width: 0.22          # slightly wider for better visibility
  seg_height: 0.02
  z_lift: 0.02
  flatten_road_z: true
  road_z_m: 0.0
  polyline_reduction_area: 0.0
  min_points_for_reduction: 10
  enable_segment_collision: false
  trigger_enable: false

vehicles:
  student_usd: "artifacts/student_vehicle_assets/vehicle_only_smoke/student_fwd_vehicle.usd"
  tunable_config_json: "artifacts/student_vehicle_sysid/comprehensive_fwd_v1_cem_v4/best_config.json"
  max_controllable_per_world: 8
  spawn_height_m: 1.2
  require_goal_in_bounds: true
  skip_if_start_in_goal: true
  goal_radius_m: 3.0
  start_goal_thresh_m: 3.0

goal_markers:
  enable: true
  radius_m: 1.0
  height_m: 0.12

viewer:
  # Bird's-eye view over the 2x2 grid of worlds
  eye:    [260.0, 160.0, 280.0]
  lookat: [120.0, 120.0,   0.0]
  light_path: "/World/Light"
  light_intensity: 3500.0
  light_color: [0.82, 0.82, 0.80]

sim:
  dt: 0.008333333333333333   # 120 Hz
  steps: 0                   # 0 = run until window is closed
